name: Release

on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --runInBand

      - name: Build
        run: npm run build

      - name: Preview publish contents
        run: npm pack --dry-run

      - name: Validate release tag and choose npm dist-tag
        id: release_meta
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          TAG_NAME="${{ github.event.release.tag_name }}"

          if [[ "$TAG_NAME" != "v$VERSION" ]]; then
            echo "Release tag $TAG_NAME does not match package.json version v$VERSION" >&2
            exit 1
          fi

          if [[ "$VERSION" == *-* ]]; then
            DIST_TAG="next"
          else
            DIST_TAG="latest"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "dist_tag=$DIST_TAG" >> "$GITHUB_OUTPUT"

      - name: Publish package
        run: npm publish --provenance --access public --tag "${{ steps.release_meta.outputs.dist_tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Write workflow summary
        run: |
          {
            echo "## npm release"
            echo ""
            echo "- Version: \`${{ steps.release_meta.outputs.version }}\`"
            echo "- npm dist-tag: \`${{ steps.release_meta.outputs.dist_tag }}\`"
            echo "- Git tag: \`${{ github.event.release.tag_name }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
